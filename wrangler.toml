name = "d1-rest"
main = "src/index.ts"
compatibility_date = "2026-03-09"

# Um único worker: prod e stage por hostname (ex.: d1-rest-stage.xxx contém "stage") ou header X-Environment: stage
[[d1_databases]]
binding = "DB_PROD"
database_name = "utua-quiz-db"
database_id = "90182616-5fc9-4fdc-8375-f21ef0f36826"

[[d1_databases]]
binding = "DB_STAGE"
database_name = "utua-quiz-db-stage"
database_id = "5eadb4e2-2514-4868-8f12-09cd4896caa5"

[vars]
API_KEY = "90a9161a-ea98-41bd-b1b0-d9fe8c0ce91c"
BITBUCKET_WORKSPACE = "tech-utua"
BITBUCKET_FRONT_QUIZ_STATIC_REPO = "front-quiz-static"
BITBUCKET_STAGE_BRANCH = "main"

[observability]
[observability.logs]
enabled = false
invocation_logs = true
